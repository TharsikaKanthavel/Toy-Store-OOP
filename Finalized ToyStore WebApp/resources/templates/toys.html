<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - Toy Store'">Toys - Toy Store</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<!-- Header/Navigation bar -->
<div th:replace="fragments/header :: header"></div>

<!-- Page Header -->
<section class="py-4 bg-light">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-6">
                <h2 class="mb-0" th:text="${pageTitle}">All Toys</h2>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="/">Home</a></li>
                        <li class="breadcrumb-item active" aria-current="page" th:text="${pageTitle}">All Toys</li>
                    </ol>
                </nav>
            </div>
            <div class="col-md-6 text-md-end mt-3 mt-md-0">
                <a th:if="${user != null and user.isAdmin()}" th:href="@{/toys/new}" id="addToyBtn" class="btn btn-primary">
                    <i class="bi bi-plus-circle me-2"></i>Add New Toy
                </a>
            </div>
        </div>
    </div>
</section>

<!-- Main Content -->
<section class="py-5">
    <div class="container">
        <!-- Active Filters -->
        <div id="activeFilters" class="mb-4" style="display: none;"></div>

        <div class="row">
            <!-- Filters Sidebar -->
            <div class="col-lg-3 mb-4">
                <div class="filters">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="filter-title mb-0">Filters</h5>
                        <button id="clearFiltersBtn" class="btn btn-sm btn-outline-secondary">Clear All</button>
                    </div>

                    <!-- Sort Dropdown -->
                    <div class="mb-4">
                        <label for="sortDropdown" class="form-label">Sort By</label>
                        <select class="form-select" id="sortDropdown">
                            <option value="default">Default</option>
                            <option value="age">Age (Low to High)</option>
                        </select>
                    </div>

                    <!-- Category Filters -->
                    <div class="mb-4">
                        <h6 class="filter-title">Categories</h6>
                        <div class="filter-option" th:each="category : ${categories}">
                            <div class="form-check">
                                <input class="form-check-input category-filter" type="checkbox" th:value="${category.name()}" th:id="'category-' + ${category.name()}">
                                <label class="form-check-label" th:for="'category-' + ${category.name()}" th:text="${category.displayName}">Category</label>
                            </div>
                        </div>
                    </div>

                    <!-- Age Group Filters -->
                    <div class="mb-4">
                        <h6 class="filter-title">Age Group</h6>
                        <div class="filter-option">
                            <div class="form-check">
                                <input class="form-check-input age-filter" type="checkbox" value="0" id="age-0-2">
                                <label class="form-check-label" for="age-0-2">0-2 years</label>
                            </div>
                        </div>
                        <div class="filter-option">
                            <div class="form-check">
                                <input class="form-check-input age-filter" type="checkbox" value="3" id="age-3-5">
                                <label class="form-check-label" for="age-3-5">3-5 years</label>
                            </div>
                        </div>
                        <div class="filter-option">
                            <div class="form-check">
                                <input class="form-check-input age-filter" type="checkbox" value="6" id="age-6-8">
                                <label class="form-check-label" for="age-6-8">6-8 years</label>
                            </div>
                        </div>
                        <div class="filter-option">
                            <div class="form-check">
                                <input class="form-check-input age-filter" type="checkbox" value="9" id="age-9-12">
                                <label class="form-check-label" for="age-9-12">9-12 years</label>
                            </div>
                        </div>
                        <div class="filter-option">
                            <div class="form-check">
                                <input class="form-check-input age-filter" type="checkbox" value="13" id="age-13-plus">
                                <label class="form-check-label" for="age-13-plus">13+ years</label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Toys Grid -->
            <div class="col-lg-9">
                <div class="row" id="toysContainer">
                    <!-- Toys will be loaded dynamically via JavaScript -->
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Back to top button -->
<button id="backToTop" class="btn btn-primary btn-sm position-fixed bottom-0 end-0 m-4 rounded-circle" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s;">
    <i class="bi bi-arrow-up"></i>
</button>

<!-- Footer -->
<div th:replace="fragments/footer :: footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/toys.js}"></script>

<!-- Debug Log -->
<script th:inline="javascript">
    console.log("User from controller:", /*[[${user}]]*/ null);
</script>

</body>
</html>
