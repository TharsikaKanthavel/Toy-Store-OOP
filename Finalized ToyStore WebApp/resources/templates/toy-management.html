<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toy Store - Manage Toys</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<!-- Include header fragment -->
<div th:replace="fragments/header :: header"></div>

<div class="container my-5">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-lg-3">
            <div class="card mb-4">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0"><i class="bi bi-shield-lock me-2"></i>Admin Menu</h5>
                </div>
                <div class="card-body">
                    <div class="d-flex flex-column">
                        <a href="/user/admin" class="btn btn-outline-danger mb-2">
                            <i class="bi bi-people me-2"></i>Manage Users
                        </a>

                        <a href="/toys/manage" class="btn btn-danger mb-2">
                            <i class="bi bi-box-seam me-2"></i>Manage Toys
                        </a>

                        <a href="/user/profile" class="btn btn-outline-secondary mb-2">
                            <i class="bi bi-person-badge me-2"></i>My Profile
                        </a>

                        <a href="/user/logout" class="btn btn-outline-secondary">
                            <i class="bi bi-box-arrow-right me-2"></i>Logout
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-lg-9">
            <div class="card shadow">
                <div class="card-header bg-danger text-white d-flex justify-content-between align-items-center">
                    <h4 class="mb-0"><i class="bi bi-box-seam me-2"></i>Toy Management</h4>
                    <a href="/toys/new" class="btn btn-light">
                        <i class="bi bi-plus-circle me-2"></i>Add New Toy
                    </a>
                </div>

                <div class="card-body p-4">
                    <!-- Alert for errors -->
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <!-- Alert for success messages -->
                    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover border">
                            <thead class="table-light">
                            <tr>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Price</th>
                                <th>Category</th>
                                <th>Age Group</th>
                                <th>Stock</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="toy : ${toys}">
                                <td>
                                    <img th:if="${toy.imageUrl != null && !toy.imageUrl.isEmpty()}"
                                         th:src="${toy.imageUrl}" alt="Toy image"
                                         class="img-thumbnail" style="width: 50px; height: 50px; object-fit: cover;">
                                    <span th:unless="${toy.imageUrl != null && !toy.imageUrl.isEmpty()}"
                                          class="badge bg-secondary">No Image</span>
                                </td>
                                <td th:text="${toy.name}">Toy Name</td>
                                <td>$<span th:text="${#numbers.formatDecimal(toy.price, 1, 2)}">0.00</span></td>
                                <td th:text="${toy.category.displayName}">Category</td>
                                <td><span th:text="${toy.ageGroup}"></span>+ years</td>
                                <td th:text="${toy.quantity}">Stock</td>
                                <td>
                                    <div class="btn-group" role="group">
                                        <a th:href="@{/toys/edit/{id}(id=${toy.id})}" class="btn btn-sm btn-primary">
                                            <i class="bi bi-pencil"></i> Edit
                                        </a>
                                        <button class="btn btn-sm btn-danger ms-1"
                                                onclick="deleteToy(this.getAttribute('data-id'), this.getAttribute('data-name'))"
                                                th:data-id="${toy.id}" th:data-name="${toy.name}">
                                            <i class="bi bi-trash"></i> Delete
                                        </button>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Confirm Delete Modal -->
<div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-labelledby="confirmDeleteModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="confirmDeleteModalLabel">Confirm Delete</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Are you sure you want to delete the toy "<span id="toyNameToDelete"></span>"?
                <p class="text-danger mt-2">This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>
</div>

<!-- Include footer fragment -->
<div th:replace="fragments/footer :: footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="/js/main.js"></script>

<script>
    // Delete toy functionality
    function deleteToy(toyId, toyName) {
        document.getElementById('toyNameToDelete').textContent = toyName;
        const deleteModal = new bootstrap.Modal(document.getElementById('confirmDeleteModal'));
        deleteModal.show();

        document.getElementById('confirmDeleteBtn').onclick = function() {
            fetch(`/api/toys/${toyId}`, {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
                .then(response => {
                    if (response.ok || response.status === 204) {
                        window.location.reload();
                    } else {
                        alert('Error deleting toy');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error deleting toy');
                });

            deleteModal.hide();
        };
    }
</script>

</body>
</html>
