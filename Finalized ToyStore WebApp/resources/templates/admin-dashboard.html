<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toy Store - Admin Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<!-- Include header fragment -->
<div th:replace="fragments/header :: header"></div>

<div class="container my-5">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-lg-3">
            <div class="card mb-4">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0"><i class="bi bi-shield-lock me-2"></i>Admin Menu</h5>
                </div>
                <div class="card-body">
                    <div class="d-flex flex-column">
                        <a href="/user/admin" class="btn btn-danger mb-2">
                            <i class="bi bi-people me-2"></i>Manage Users
                        </a>

                        <a href="/toys/manage" class="btn btn-outline-danger mb-2">
                            <i class="bi bi-box-seam me-2"></i>Manage Toys
                        </a>

                        <a href="/user/profile" class="btn btn-outline-secondary mb-2">
                            <i class="bi bi-person-badge me-2"></i>My Profile
                        </a>

                        <a href="/user/logout" class="btn btn-outline-secondary">
                            <i class="bi bi-box-arrow-right me-2"></i>Logout
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-lg-9">
            <div class="card shadow">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0"><i class="bi bi-people me-2"></i>User Management</h4>
                </div>

                <div class="card-body p-4">
                    <!-- Alert for errors -->
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <!-- Alert for success messages -->
                    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover border">
                            <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Full Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${#strings.substring(user.id, 0, 8) + '...'}">ID</td>
                                <td th:text="${user.username}">Username</td>
                                <td th:text="${user.getFullName()}">Full Name</td>
                                <td th:text="${user.email}">Email</td>
                                <td>
                                    <span th:if="${user.role.name() == 'ADMIN'}" class="badge bg-danger">Admin</span>
                                    <span th:if="${user.role.name() == 'CUSTOMER'}" class="badge bg-primary">Customer</span>
                                </td>
                                <td>
                                    <div class="btn-group" role="group">
                                        <!-- Don't show promote button for admins or the current user -->
                                        <form th:if="${user.role.name() != 'ADMIN' && user.id != session.user.id}"
                                              th:action="@{/user/admin/promote/{id}(id=${user.id})}" method="post">
                                            <button type="submit" class="btn btn-sm btn-warning"
                                                    onclick="return confirm('Are you sure you want to promote this user to admin?')">
                                                <i class="bi bi-arrow-up-circle"></i> Promote
                                            </button>
                                        </form>

                                        <!-- Don't show delete button for the current user -->
                                        <form th:if="${user.id != session.user.id}"
                                              th:action="@{/user/admin/delete/{id}(id=${user.id})}" method="post">
                                            <button type="submit" class="btn btn-sm btn-danger ms-1"
                                                    onclick="return confirm('Are you sure you want to delete this user?')">
                                                <i class="bi bi-trash"></i> Delete
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Include footer fragment -->
<div th:replace="fragments/footer :: footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="/js/main.js"></script>

</body>
</html>
